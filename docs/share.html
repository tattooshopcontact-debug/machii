<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suivi de trajet — Machii</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #F8F4EC; color: #1B3D6E; }
    header { background: #1B3D6E; color: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    header svg { width: 36px; height: 36px; }
    header h1 { font-size: 18px; margin: 0; }
    .live { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #4ADE80; }
    .live::before { content: ''; width: 8px; height: 8px; border-radius: 4px; background: #4ADE80; animation: pulse 1.5s infinite; }
    @keyframes pulse { 50% { opacity: 0.3; } }
    main { max-width: 560px; margin: 0 auto; padding: 16px; }
    .card { background: #fff; border-radius: 16px; padding: 16px 18px; margin-bottom: 12px; border: 1px solid rgba(27,61,110,0.08); }
    .route { font-size: 20px; font-weight: 700; }
    .meta { color: #667; font-size: 14px; margin-top: 4px; }
    #map { height: 320px; border-radius: 16px; border: 1px solid rgba(27,61,110,0.12); }
    .state { text-align: center; padding: 48px 20px; color: #667; }
    .updated { font-size: 12px; color: #999; text-align: center; margin-top: 8px; }
    .expired { background: #FDECEC; border-left: 4px solid #DC3545; padding: 14px 18px; border-radius: 8px; color: #842029; }
    footer { text-align: center; color: #999; font-size: 12px; padding: 24px; }
  </style>
</head>
<body>
  <header>
    <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <rect width="1024" height="1024" rx="220" fill="#13315A"/>
      <g fill="#FFD400">
        <path d="M 220 240 L 320 240 L 512 540 L 704 240 L 804 240 L 804 784 L 712 784 L 712 430 L 552 678 L 472 678 L 312 430 L 312 784 L 220 784 Z"/>
        <circle cx="512" cy="180" r="32"/>
      </g>
    </svg>
    <div>
      <h1>Suivi de trajet Machii</h1>
      <span class="live" id="liveBadge" style="display:none">EN DIRECT</span>
    </div>
  </header>

  <main>
    <div id="loading" class="state">Chargement du trajet…</div>
    <div id="error" class="state" style="display:none"></div>

    <div id="content" style="display:none">
      <div class="card">
        <div class="route" id="route"></div>
        <div class="meta" id="meta"></div>
      </div>
      <div id="map"></div>
      <div class="updated" id="updated"></div>
    </div>
  </main>

  <footer>Machii · covoiturage · lien de suivi valable 4 heures</footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const SUPABASE_URL = 'https://qtgqvwfzwjprclqrkfue.supabase.co';
    const ANON_KEY = 'sb_publishable_cnirUBhoUJz3L7I9VpK-nQ_R3zmBpGn';
    const token = new URLSearchParams(location.search).get('t');

    let map = null;
    let marker = null;

    async function fetchShared() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_shared_trip`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          apikey: ANON_KEY,
          Authorization: `Bearer ${ANON_KEY}`,
        },
        body: JSON.stringify({ p_token: token }),
      });
      return res.json();
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'none';
      const el = document.getElementById('error');
      el.style.display = 'block';
      el.innerHTML = `<div class="expired">${msg}</div>`;
    }

    function render(data) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.getElementById('route').textContent = `${data.origin} → ${data.destination}`;
      const dep = new Date(data.departure_time);
      document.getElementById('meta').textContent =
        `${data.sharer_name} · conducteur : ${data.driver_name} · départ ${dep.toLocaleString('fr-FR', { weekday: 'short', day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}`;

      if (data.position) {
        document.getElementById('liveBadge').style.display = 'inline-flex';
        const { lat, lng, updated_at } = data.position;
        if (!map) {
          map = L.map('map').setView([lat, lng], 11);
          L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
          }).addTo(map);
          marker = L.marker([lat, lng]).addTo(map);
        } else {
          marker.setLatLng([lat, lng]);
          map.panTo([lat, lng]);
        }
        const age = Math.round((Date.now() - new Date(updated_at).getTime()) / 60000);
        document.getElementById('updated').textContent =
          age <= 1 ? "Position mise à jour à l'instant" : `Dernière position il y a ${age} min`;
      } else {
        document.getElementById('liveBadge').style.display = 'none';
        document.getElementById('map').innerHTML =
          '<div class="state">Le partage de position n\'est pas encore actif.<br>Réessaie dans un instant.</div>';
        document.getElementById('updated').textContent = '';
      }
    }

    async function tick() {
      try {
        const data = await fetchShared();
        if (!data || data.ok === false) {
          if (data && data.reason === 'expired') {
            showError('⏱️ Ce lien de suivi a expiré (validité 4 heures). Demande un nouveau lien à ton proche.');
          } else {
            showError('Lien de suivi introuvable ou révoqué.');
          }
          clearInterval(timer);
          return;
        }
        render(data);
      } catch (e) {
        showError('Erreur de connexion. Vérifie ta connexion internet.');
      }
    }

    if (!token) {
      showError('Lien invalide : jeton manquant.');
    } else {
      tick();
      var timer = setInterval(tick, 15000);
    }
  </script>
</body>
</html>
